<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Asterisk</title>
        <link rel="stylesheet" href="../lib/tailwind.css" />
        <link rel="stylesheet" href="../lib/switch.css" />
        <link rel="stylesheet" href="../lib/theme.css" />
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body class="w-80 bg-gray-50 text-gray-800 antialiased">
        <div class="px-4 pt-4 pb-3">
            <header class="flex items-center gap-2.5 mb-3">
                <img
                    id="ast-brand"
                    src="../../icons/icon-48.png"
                    alt="Asterisk"
                    class="w-9 h-9 rounded-xl"
                />
                <div class="leading-tight">
                    <div class="text-sm font-semibold text-gray-900">
                        Asterisk
                    </div>
                    <div class="text-xs text-gray-500">
                        Privacy check for AI chats
                    </div>
                </div>
            </header>

            <div
                class="flex items-center justify-between rounded-xl bg-white border border-gray-200 px-3 py-2.5 mb-3"
            >
                <div class="flex items-center gap-2.5">
                    <span class="text-gray-500" id="ast-power-icon"></span>
                    <div class="leading-tight">
                        <div class="text-sm font-medium text-gray-800">
                            Protection
                        </div>
                        <div class="text-xs text-gray-500" id="ast-master-sub">
                            On — warn before sending
                        </div>
                    </div>
                </div>
                <label class="ast-switch">
                    <input
                        type="checkbox"
                        id="ast-master"
                        class="ast-switch-input"
                        aria-label="Protection"
                    />
                    <span class="ast-switch-track"
                        ><span class="ast-switch-thumb"></span
                    ></span>
                </label>
            </div>

            <div id="ast-sites-section">
                <div
                    class="text-xs uppercase tracking-wide font-semibold text-gray-400 mb-1.5 px-1"
                >
                    Active on these platforms
                </div>
                <ul id="ast-sites" class="flex flex-col gap-1.5"></ul>
            </div>

            <div
                id="ast-status"
                class="mt-3 flex items-center gap-2 rounded-xl bg-white border border-gray-200 px-3 py-2 text-xs text-gray-600"
            ></div>

            <footer class="mt-3 flex items-center justify-between">
                <span class="text-xs text-gray-400" id="ast-version"></span>
                <button
                    id="ast-settings-btn"
                    class="inline-flex items-center gap-1.5 text-xs font-medium text-[#F17528] hover:text-[#d9621a] cursor-pointer"
                ></button>
            </footer>
        </div>

        <script src="../lib/icons.js"></script>
        <script src="../config/sites.js"></script>
        <script src="../lib/storage.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
